server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/seatdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Taipei
    username: seatuser
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.jdbc: debug
